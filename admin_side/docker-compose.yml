services:
  postgres:
    image: postgres:16-alpine
    container_name: tiger-strapi-postgres
    restart: unless-stopped
    ports:
      # Host 5433 avoids clashing with other local Postgres instances on 5432
      - "5433:5432"
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    volumes:
      - strapi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  strapi_pg_data:
